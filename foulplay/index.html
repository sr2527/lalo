<style>
:root{
  --cream:#FFF8EE;--ink:#23201B;--soft:#6B6359;
  --blue:#163C6E;--blue2:#2A5DA0;
  --yellow:#FFD100;--terra:#E07A5F;--mint:#9DC8A0;
  --card:#FFFFFF;--line:#ECE2D2;
  --shadow:0 8px 24px rgba(60,40,20,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--ink);
  overscroll-behavior:none;line-height:1.45}
.serif{font-family:'Fraunces',Georgia,serif}
#app{max-width:520px;margin:0 auto;min-height:100%;position:relative;padding-bottom:88px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-size:1rem}

.pad{padding:22px 20px}
.h1{font-family:'Fraunces',serif;font-size:2rem;line-height:1.08;font-weight:600;letter-spacing:-.5px}
.h2{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:600}
.eyebrow{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--terra);font-weight:700}
.muted{color:var(--soft)}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
.btn{display:block;width:100%;text-align:center;background:var(--blue);color:#fff;font-weight:700;
  padding:16px;border-radius:16px;font-size:1.02rem;transition:transform .08s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn.alt{background:var(--yellow);color:var(--ink)}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn.red{background:#CE1126}
.btn:disabled{opacity:.45;pointer-events:none}
.chip{display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border-radius:14px;
  border:1.5px solid var(--line);background:#fff;font-weight:500;font-size:.9rem}
.row{display:flex;gap:10px}
.center{text-align:center}
.spacer{height:14px}
.divider{height:1px;background:var(--line);margin:18px 0}

/* screens / onboarding */
.screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px 24px;
  animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.opt{width:100%;text-align:left;padding:18px;border-radius:18px;border:1.5px solid var(--line);
  background:#fff;margin-bottom:11px;font-weight:600;font-size:1.02rem;transition:transform .08s,border-color .15s}
.opt:active{transform:scale(.98)}
.opt .sub{font-weight:400;font-size:.85rem;color:var(--soft);margin-top:3px}
.opt.pick{border-color:var(--blue);background:#F3F7FD}
.progress{display:flex;gap:6px;margin-bottom:26px}
.progress i{flex:1;height:5px;border-radius:3px;background:var(--line)}
.progress i.fill{background:var(--terra)}

/* session screen */
.code-box{font-family:'Fraunces',serif;font-size:2.4rem;letter-spacing:.25em;font-weight:600;
  background:#F3F7FD;border:2px solid var(--blue);border-radius:16px;padding:18px;text-align:center;
  margin:14px 0;user-select:all}
.join-input{width:100%;font-family:'Fraunces',serif;font-size:2rem;letter-spacing:.2em;text-align:center;
  border:2px solid var(--line);border-radius:16px;padding:16px;background:#fff;text-transform:uppercase}
.join-input:focus{border-color:var(--blue);outline:none}

/* jersey picker */
.jersey-stage{display:flex;gap:40px;justify-content:center;align-items:flex-end;margin:28px 0 24px;overflow:visible}
.jersey-btn{background:none;border:none;padding:0 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;overflow:visible;transition:transform .15s}
.jersey-btn:active{transform:scale(.95)}
.j-wrap{position:relative;width:82px;height:122px;overflow:visible}
.j-body{width:82px;height:122px;border-radius:6px 6px 14px 14px;position:relative;transition:transform .1s;box-shadow:0 6px 18px rgba(0,0,0,.2)}
.j-sleeve-l,.j-sleeve-r{position:absolute;top:2px;width:26px;height:36px;border-radius:5px 5px 0 0}
.j-sleeve-l{left:-20px;transform:rotate(-10deg);transform-origin:bottom right}
.j-sleeve-r{right:-20px;transform:rotate(10deg);transform-origin:bottom left}
.j-collar{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:36px;height:18px;background:rgba(0,0,0,.12);border-radius:0 0 18px 18px}
.j-label{position:absolute;bottom:24px;left:0;right:0;text-align:center}
.j-name{font-size:.7rem;font-weight:900;letter-spacing:.15em;opacity:.85}
.j-num{font-size:2.4rem;font-weight:900;line-height:1;opacity:.9}
.jersey-tag{font-weight:700;font-size:.95rem;letter-spacing:.05em}

/* surprise message bubble */
.msg-bubble{background:#fff;border-radius:20px 20px 4px 20px;padding:18px 20px;box-shadow:0 4px 20px rgba(0,0,0,.1);font-size:.96rem;line-height:1.65;border:1.5px solid var(--line);max-width:340px;margin:0 auto}

/* scoreboard */
.scoreboard{background:linear-gradient(135deg,#163C6E 0%,#0E2746 100%);color:#fff;border-radius:24px;
  padding:20px;box-shadow:var(--shadow)}
.sb-status{font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;text-align:center;margin-bottom:12px}
.sb-row{display:flex;align-items:center;justify-content:space-between}
.sb-team{flex:1;text-align:center}
.sb-flag{font-size:2.1rem}
.sb-name{font-weight:700;margin-top:3px;font-size:.9rem}
.sb-score{font-family:'Fraunces',serif;font-size:2.8rem;font-weight:600;min-width:44px;text-align:center}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF5252;
  margin-right:5px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.feed-item{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.feed-item .min{font-weight:700;color:var(--terra);min-width:36px}
.feed-item:last-child{border-bottom:none}

/* mascot */
#mascot{position:fixed;right:16px;bottom:100px;z-index:60;width:64px;height:64px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff 0%,#FFD100 55%,#E6B800 100%);
  box-shadow:0 6px 18px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;
  font-size:2rem;border:3px solid #fff;animation:bob 2.4s ease-in-out infinite;cursor:pointer}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#mascot:active{transform:scale(.88)!important}
#mface{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;pointer-events:none}
.meyes{display:flex;gap:11px;position:relative;z-index:2}
.meye{width:6px;height:7px;border-radius:50%;background:#23201B;animation:blink 4s ease-in-out infinite}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.05)}}
.mbrows{display:flex;gap:8px;margin-bottom:-2px}
.mbrow{width:8px;height:2px;background:#23201B;border-radius:2px;transition:transform .25s}
.mmouth{width:14px;height:7px;border-bottom:2.5px solid #23201B;border-radius:0 0 10px 10px;transition:all .25s}
.mmouth.sad{border-bottom:none;border-top:2.5px solid #23201B;border-radius:10px 10px 0 0;margin-top:4px}
.mmouth.shocked{width:10px;height:10px;border:2.5px solid #23201B;border-radius:50%;border-bottom-width:2.5px}
#mascot.hype{animation:bob 2.4s ease-in-out infinite,spin .5s ease-in-out}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
#bubble{position:fixed;right:16px;bottom:176px;z-index:61;max-width:260px;background:#fff;
  border:2px solid var(--blue);border-radius:18px 18px 4px 18px;padding:14px 16px;
  box-shadow:var(--shadow);display:none}
#bubble.show{display:block;animation:pop .25s ease}
#bubble .who{font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--terra);
  font-weight:700;margin-bottom:4px}
#bubble p{font-family:'Fraunces',serif;font-size:.98rem;font-style:italic;line-height:1.4}
@keyframes pop{from{opacity:0;transform:scale(.85) translateY(6px)}to{opacity:1;transform:none}}

/* nav */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:rgba(255,248,238,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:none;flex;z-index:50;padding:8px 2px calc(8px + env(safe-area-inset-bottom))}
#nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;
  font-size:.62rem;font-weight:600;color:var(--soft)}
#nav button .ic{font-size:1.3rem;opacity:.7;transition:transform .15s}
#nav button.on{color:var(--blue)}
#nav button.on .ic{opacity:1;transform:translateY(-2px)}

/* tabs */
.tab{display:none}
.tab.on{display:block;animation:fade .3s ease}
.sectitle{display:flex;align-items:center;gap:8px;margin:0 0 12px}
.sectitle .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--terra)}

/* counters */
.counter{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;
  border:1.5px solid var(--line);border-radius:15px;background:#fff;margin-bottom:9px}
.counter .lbl{font-weight:600;font-size:.9rem;flex:1;padding-right:10px}
.counter .ct{display:flex;align-items:center;gap:12px}
.counter .num{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;min-width:22px;text-align:center}
.plus{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;font-size:1.4rem;
  display:flex;align-items:center;justify-content:center}
.minus{width:30px;height:30px;border-radius:50%;background:var(--line);color:var(--soft);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center}

/* inputs */
textarea.note{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:13px;
  resize:none;min-height:64px;background:#fff}
textarea.note:focus{border-color:var(--blue);outline:none}
input.txt{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:13px;background:#fff}
input.txt:focus{border-color:var(--blue);outline:none}
.logline{padding:11px 13px;background:#FBF6EC;border-radius:12px;margin-bottom:8px;font-size:.9rem;line-height:1.4}
.logline .meta{font-size:.7rem;color:var(--soft);font-weight:700;margin-bottom:3px}

/* bets */
.bet{border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;background:#fff}
.bet .q{font-weight:600;margin-bottom:10px;font-size:.95rem}
.pickrow{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.pickrow .who{font-size:.7rem;font-weight:700;width:44px;color:var(--soft);flex-shrink:0}
.pickrow button{flex:1;padding:9px 6px;border-radius:11px;border:1.5px solid var(--line);
  font-weight:600;font-size:.82rem;transition:background .12s}
.pickrow button.sel-her{background:#E07A5F;color:#fff;border-color:#E07A5F}
.pickrow button.sel-him{background:var(--blue);color:#fff;border-color:var(--blue)}
.pickrow button.sel-res{background:var(--mint);color:var(--ink);border-color:var(--mint)}

/* photos */
.photo-cell{border:1.5px dashed var(--line);border-radius:16px;padding:14px;margin-bottom:10px;background:#fff}
.photo-cell.done{border-style:solid;border-color:var(--mint)}
.photo-cell img{width:100%;border-radius:11px;margin-top:10px;display:block;max-height:260px;object-fit:cover}
.photo-cell .cap{font-weight:600;font-size:.95rem}
.photo-cell .hint{font-size:.8rem;color:var(--soft);margin-top:3px}

/* timeline */
.tl{position:relative;padding-left:26px}
.tl:before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl .ev{position:relative;margin-bottom:16px}
.tl .ev:before{content:"";position:absolute;left:-23px;top:5px;width:11px;height:11px;border-radius:50%;
  background:var(--terra);border:2px solid var(--cream)}
.tl .ev .t{font-weight:700;font-size:.82rem;color:var(--blue)}

/* sync indicator */
.sync-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:var(--mint);color:var(--ink);font-size:.78rem;font-weight:700;text-align:center;
  padding:6px;z-index:80;display:none}
.sync-bar.show{display:block}

/* confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden;display:none}
.confetti.go{display:block}
.cf{position:absolute;width:9px;height:14px;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

.tag{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;
  background:#F3F7FD;color:var(--blue)}
.flagband{height:5px;border-radius:4px;display:flex;overflow:hidden;margin:8px 0}
.flagband i{flex:1}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:none}
.recap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
</style>
</head>

/* ===================== JSONBIN SYNC ===================== */
const SYNC_FIELDS=["score","statusText","lastStatus","events","seenEvents","herLog","hisLog",
  "herPred","hisPred","betHer","betHim","betResult","commentary","quotes","prediction","ratings",
  "wagerHer","wagerHim","wagerRevealed"];

function getSyncPayload(){
  const o={ts:Date.now()};
  SYNC_FIELDS.forEach(k=>o[k]=S[k]);
  return o;
}
function applySyncPayload(o){
  if(!o||!o.ts)return;
  if(o.ts<=S.remoteTs)return; // already have this
  S.remoteTs=o.ts;
  SYNC_FIELDS.forEach(k=>{if(o[k]!==undefined)S[k]=o[k];});
}

let syncDebounce=null;
async function pushSync(){
  if(!S.binId)return;
  clearTimeout(syncDebounce);
  syncDebounce=setTimeout(async()=>{
    try{
      showSyncBar("saving...");
      await fetch(`${BIN_BASE}/${S.binId}`,{
        method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY},
        body:JSON.stringify(getSyncPayload())
      });
      hideSyncBar();
    }catch(e){hideSyncBar();}
  },600);
}

let pollInterval=null;
async function pollSync(){
  if(!S.binId)return;
  try{
    const r=await fetch(`${BIN_BASE}/${S.binId}/latest`,{headers:{"X-Master-Key":BIN_KEY}});
    const j=await r.json();
    const payload=j.record;
    if(payload&&payload.ts>S.remoteTs){
      const prevScore=JSON.stringify(S.score);
      const prevEvents=S.events.length;
      applySyncPayload(payload);
      // check for new goal events
      if(S.events.length>prevEvents){
        const newest=S.events[S.events.length-1];
        if(newest&&newest.icon==="⚽"){
          const colScored=newest.title.toLowerCase().includes("colombia");
          confetti();flashMascot(rand(colScored?REACT.colGoal:REACT.jorGoal));
        }
      }
      if(JSON.stringify(S.score)!==prevScore&&document.getElementById("tab-match")){
        paintScoreboard();
      }
      softRender();
    }
  }catch(e){}
}

function startPolling(){
  clearInterval(pollInterval);
  pollInterval=setInterval(pollSync,5000);
}

async function createBin(){
  showSyncBar("creating session...");
  const r=await fetch(BIN_BASE,{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY,
      "X-Bin-Name":"touchdown-game-day","X-Bin-Private":"true"},
    body:JSON.stringify(getSyncPayload())
  });
  const j=await r.json();
  hideSyncBar();
  return j.metadata&&j.metadata.id?j.metadata.id:null;
}

async function joinBin(id){
  showSyncBar("joining...");
  const r=await fetch(`${BIN_BASE}/${id}/latest`,{headers:{"X-Master-Key":BIN_KEY}});
  const j=await r.json();
  hideSyncBar();
  if(j.record){applySyncPayload(j.record);return true;}
  return false;
}

function showSyncBar(msg){
  const b=document.getElementById("syncBar");b.textContent=msg;b.classList.add("show");
}
function hideSyncBar(){
  setTimeout(()=>document.getElementById("syncBar").classList.remove("show"),1200);
}

/* ===================== MASCOT ===================== */
let bubbleTimer=null;
function tapMascot(){setMood("happy");flashMascot(rand(QUOTES));}
function setMood(mood){
  const mouth=document.getElementById("mmouth");
  const bl=document.getElementById("browL"),br=document.getElementById("browR");
  if(!mouth)return;
  mouth.className="mmouth";
  if(bl)bl.style.transform=""; if(br)br.style.transform="";
  if(mood==="goal"){
    mouth.classList.add("shocked");
    if(bl)bl.style.transform="rotate(-20deg) translateY(-2px)";
    if(br)br.style.transform="rotate(20deg) translateY(-2px)";
    document.getElementById("mascot").classList.add("hype");
    setTimeout(()=>document.getElementById("mascot")?.classList.remove("hype"),600);
  } else if(mood==="sad"){
    mouth.classList.add("sad");
    if(bl)bl.style.transform="rotate(15deg)";
    if(br)br.style.transform="rotate(-15deg)";
  } else if(mood==="happy"){
    if(bl)bl.style.transform="rotate(-10deg) translateY(-1px)";
    if(br)br.style.transform="rotate(10deg) translateY(-1px)";
  }
}
function flashMascot(text,mood){
  const b=document.getElementById("bubble"),t=document.getElementById("bubbleText");
  if(!b||!t)return;
  if(mood)setMood(mood); else setMood("happy");
  t.textContent=text;b.classList.add("show");
  clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=>{b.classList.remove("show");setMood("normal");},5500);
}

/* ===================== CONFETTI ===================== */
function confetti(){
  const c=document.getElementById("confetti");c.innerHTML="";c.classList.add("go");
  const cols=["#FFD100","#003893","#CE1126","#fff","#E07A5F","#9DC8A0"];
  for(let i=0;i<75;i++){
    const d=document.createElement("div");d.className="cf";
    d.style.left=Math.random()*100+"%";
    d.style.background=cols[i%cols.length];
    d.style.animationDuration=(1.5+Math.random()*1.8)+"s";
    d.style.animationDelay=(Math.random()*.5)+"s";
    c.appendChild(d);
  }
  setTimeout(()=>c.classList.remove("go"),3500);
}

/* ===================== LIVE FEED (API-Football) ===================== */
function manualScore(){
  const h=prompt("Colombia goals:",S.score?.h||0);
  const a=prompt("Jordan goals:",S.score?.a||0);
  if(h===null)return;
  S.score={h:parseInt(h)||0,a:parseInt(a)||0};syncSave();paintScoreboard();
}
function demoGoal(){
  S.score=S.score||{h:0,a:0};S.score.h++;
  S.events=S.events||[];
  S.events.push({min:S.events.length*8+11,icon:"⚽",title:"GOAL — Colombia",detail:"Demo: Luis Díaz rifles it into the top corner"});
  syncSave();paintScoreboard();confetti();flashMascot(rand(REACT.colGoal));
}
async function findFixture(){
  try{
    const r=await fetch("https://v3.football.api-sports.io/fixtures?date=2026-06-07&timezone=America/Los_Angeles",
      {headers:{"x-apisports-key":FOOTBALL_KEY}});
    const j=await r.json();
    const m=(j.response||[]).find(f=>{
      const h=(f.teams.home.name||"").toLowerCase(),a=(f.teams.away.name||"").toLowerCase();
      return (h.includes("colombia")||a.includes("colombia"))&&(h.includes("jordan")||a.includes("jordan"));
    });
    if(m){S.fixtureId=m.fixture.id;S.homeIsCol=(m.teams.home.name||"").toLowerCase().includes("colombia");saveLocal();}
  }catch(e){console.warn(e);}
}
async function pollNow(){
  if(!S.fixtureId){paintScoreboard();return;}
  try{
    const r=await fetch("https://v3.football.api-sports.io/fixtures?id="+S.fixtureId,
      {headers:{"x-apisports-key":FOOTBALL_KEY}});
    const j=await r.json();const f=(j.response||[])[0];if(!f)return;
    const colHome=S.homeIsCol!==false;
    const gh=f.goals.home||0,ga=f.goals.away||0;
    S.score={h:colHome?gh:ga,a:colHome?ga:gh};
    const st=f.fixture.status.short;
    S.statusText=statusLabel(st,f.fixture.status.elapsed);
    if(st!==S.lastStatus){
      if(st==="1H"&&S.lastStatus==="NS")flashMascot(rand(REACT.kickoff));
      if(st==="HT")flashMascot(rand(REACT.half));
      if(st==="FT"||st==="AET"||st==="PEN")flashMascot(rand(REACT.full));
      S.lastStatus=st;
    }
    const evs=f.events||[];
    S.events=evs.map(e=>({
      min:e.time.elapsed+(e.time.extra?"+"+e.time.extra:""),
      icon:e.type==="Goal"?"⚽":(e.type==="Card"?(e.detail&&e.detail.includes("Red")?"🟥":"🟨"):(e.type==="subst"?"🔁":"•")),
      title:(e.type==="Goal"?"GOAL — ":"")+( e.team?.name||"")+( e.type==="Card"?" "+(e.detail||"")+"":"")+( e.type==="subst"?" sub":""),
      detail:e.player?.name||(e.assist?.name?`assist: ${e.assist.name}`:""),
      key:`${e.time.elapsed}-${e.player?.id}-${e.type}`
    }));
    S.events.forEach(e=>{
      if(!S.seenEvents.includes(e.key)){
        S.seenEvents.push(e.key);
        if(e.icon==="⚽"){const col=e.title.toLowerCase().includes("colombia");confetti();flashMascot(rand(col?REACT.colGoal:REACT.jorGoal),"goal");}
        else if(e.icon==="🟨"||e.icon==="🟥")flashMascot(rand(REACT.card));
      }
    });
    syncSave();paintScoreboard();
  }catch(e){console.warn("poll failed",e);}
}
function statusLabel(st,el){
  return {NS:"Kickoff 4:00 PM PDT",HT:"Halftime — 15 min break",FT:"Full Time",PST:"Postponed",
    "1H":"1st Half "+(el||"")+"'","2H":"2nd Half "+(el||"")+"'",ET:"Extra Time",PEN:"Penalties",AET:"After Extra Time"}[st]||st;
}
setInterval(()=>{if(document.visibilityState==="visible")pollNow();},90000);

/* ===================== PHOTOS ===================== */
function snap(id,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=900,scale=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement("canvas");
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      try{
        S.photos[id]=c.toDataURL("image/jpeg",.65);saveLocal();
        render();go("play");
        flashMascot("Now THAT is a keeper shot. 📸");
        updatePhotoCount();
      }catch(er){alert("Storage full — try deleting a photo first.");}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ===================== UTILS ===================== */
function counterHTML(group,i,label,val){
  return `<div class="counter"><span class="lbl">${label}</span>
    <div class="ct">
      <button class="minus" onclick="bump('${group}',${i},-1)">−</button>
      <span class="num" id="${group}-${i}">${val}</span>
      <button class="plus" onclick="bump('${group}',${i},1)">+</button>
    </div></div>`;
}
function bump(group,i,d){
  const map=group==="her"?S.herLog:S.hisLog;
  map[i]=Math.max(0,(map[i]||0)+d);
  syncSave();
  const el=document.getElementById(group+"-"+i);if(el)el.textContent=map[i];
  if(d>0&&Math.random()<.35)flashMascot(rand(QUOTES));
}
function syncSave(){saveLocal();pushSync();}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\'":"&quot;"}[c]));}
function nowClock(){const d=new Date();let h=d.getHours(),m=d.getMinutes();const ap=h>=12?"PM":"AM";h=h%12||12;return h+":"+(m<10?"0":"")+m+" "+ap;}
function hideNav(){document.getElementById("nav").style.display="none";}
function showNav(){document.getElementById("nav").style.display="flex";}
function resetSession(){
  if(!confirm("This clears everything — all bets, notes, and logs. Are you sure?"))return;
  localStorage.clear();location.reload();
}

/* ===================== BOOT ===================== */
loadLocal();
render();
if(S.onboarded){
  go(S.tab||"match");
  setTimeout(tallyBets,100);
  findFixture().then(()=>pollNow());
  if(S.binId)startPolling();
}
